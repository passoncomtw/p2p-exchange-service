name: ci-build-push

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: backend
            context: ./backend
            dockerfile: ./backend/Dockerfile
          - name: web
            context: ./frontend/web
            dockerfile: ./frontend/web/Dockerfile

    steps:
      - uses: actions/checkout@v4

      - name: Compute short SHA
        id: vars
        run: echo "sha=$(git rev-parse --short=7 HEAD)" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ghcr.io/passoncomtw/p2p-exchange-service/${{ matrix.name }}:prod-${{ steps.vars.outputs.sha }}
            ghcr.io/passoncomtw/p2p-exchange-service/${{ matrix.name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Output image tag
        run: |
          echo "### ${{ matrix.name }} → \`prod-${{ steps.vars.outputs.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "改 gitops 的 newTag 為 prod-${{ steps.vars.outputs.sha }} 再 argocd sync。" >> "$GITHUB_STEP_SUMMARY"
