name: expo-ios-testflight

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v1.0.0)'
        required: true
        type: string

jobs:
  build-and-submit:
    name: Build iOS & Submit to TestFlight
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate version format
        run: |
          if ! echo "${{ github.event.inputs.version }}" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Invalid version format '${{ github.event.inputs.version }}'. Expected: v1.0.0"
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn'
          cache-dependency-path: frontend/app/yarn.lock

      - name: Install dependencies
        working-directory: frontend/app
        run: yarn install --frozen-lockfile

      # 將輸入的 v1.0.0 → 1.0.0 寫入 app.json expo.version
      - name: Bump version in app.json
        working-directory: frontend/app
        run: |
          VERSION="${{ github.event.inputs.version }}"
          VERSION_NUMBER="${VERSION#v}"
          node -e "
            const fs = require('fs');
            const cfg = JSON.parse(fs.readFileSync('app.json', 'utf8'));
            cfg.expo.version = '${VERSION_NUMBER}';
            fs.writeFileSync('app.json', JSON.stringify(cfg, null, 2) + '\n');
          "
          echo "Bumped version to ${VERSION_NUMBER}"
          echo "VERSION_NUMBER=${VERSION_NUMBER}" >> "$GITHUB_ENV"

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      # EAS Cloud Build — 在 Expo 伺服器上打包 iOS .ipa
      - name: EAS Build (iOS production)
        working-directory: frontend/app
        run: |
          eas build \
            --platform ios \
            --profile production \
            --non-interactive \
            --wait

      # 上傳最新 build 到 TestFlight
      # EAS CLI 讀取 EXPO_APPLE_APP_SPECIFIC_PASSWORD 環境變數
      - name: Submit to TestFlight
        working-directory: frontend/app
        env:
          EXPO_APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.EXPO_APPLE_SPECIFIC_PASSWORD }}
        run: |
          eas submit \
            --platform ios \
            --latest \
            --non-interactive

      - name: Summary
        run: |
          echo "### iOS ${{ github.event.inputs.version }} → TestFlight" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Version: \`${{ env.VERSION_NUMBER }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Bundle ID: \`com.passon.ecoinwallet\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- App Store Connect: https://appstoreconnect.apple.com/apps/6477443899/testflight" >> "$GITHUB_STEP_SUMMARY"
