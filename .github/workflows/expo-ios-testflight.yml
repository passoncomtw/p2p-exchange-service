name: expo-build-submit

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v1.0.0)'
        required: true
        type: string
      platform:
        description: 'Build platform'
        required: true
        type: choice
        options:
          - ios
          - android
          - all
        default: ios

jobs:
  build-and-submit:
    name: EAS Build & Submit (${{ github.event.inputs.platform }})
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate version format
        run: |
          if ! echo "${{ github.event.inputs.version }}" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Invalid version format '${{ github.event.inputs.version }}'. Expected: v1.0.0"
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn'
          cache-dependency-path: frontend/app/yarn.lock

      - name: Install dependencies
        working-directory: frontend/app
        run: yarn install --frozen-lockfile

      # 將輸入的 v1.0.0 → 1.0.0 寫入 app.json expo.version
      - name: Bump version in app.json
        working-directory: frontend/app
        run: |
          VERSION="${{ github.event.inputs.version }}"
          VERSION_NUMBER="${VERSION#v}"
          node -e "
            const fs = require('fs');
            const cfg = JSON.parse(fs.readFileSync('app.json', 'utf8'));
            cfg.expo.version = '${VERSION_NUMBER}';
            fs.writeFileSync('app.json', JSON.stringify(cfg, null, 2) + '\n');
          "
          echo "Bumped version to ${VERSION_NUMBER}"
          echo "VERSION_NUMBER=${VERSION_NUMBER}" >> "$GITHUB_ENV"

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      # EAS 支援 --platform ios | android | all
      # --platform all 會在 Expo 伺服器上同時啟動兩個 build
      # --wait 等待所有 build 完成後再繼續
      - name: EAS Build
        working-directory: frontend/app
        run: |
          eas build \
            --platform ${{ github.event.inputs.platform }} \
            --profile production \
            --non-interactive \
            --wait

      # ── iOS → TestFlight ────────────────────────────────────────────────────
      - name: Submit iOS to TestFlight
        if: ${{ github.event.inputs.platform == 'ios' || github.event.inputs.platform == 'all' }}
        working-directory: frontend/app
        env:
          EXPO_APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.EXPO_APPLE_SPECIFIC_PASSWORD }}
        run: |
          eas submit \
            --platform ios \
            --latest \
            --non-interactive

      # ── Android → Google Play Internal ─────────────────────────────────────
      # 需要 GOOGLE_SERVICE_ACCOUNT_KEY secret（JSON 內容）
      - name: Write Google Service Account Key
        if: ${{ github.event.inputs.platform == 'android' || github.event.inputs.platform == 'all' }}
        working-directory: frontend/app
        run: |
          echo '${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}' > ecoinwallet-6394ffc01290.json

      - name: Submit Android to Google Play
        if: ${{ github.event.inputs.platform == 'android' || github.event.inputs.platform == 'all' }}
        working-directory: frontend/app
        run: |
          eas submit \
            --platform android \
            --latest \
            --non-interactive

      # ── Summary ─────────────────────────────────────────────────────────────
      - name: Summary
        run: |
          echo "### ${{ github.event.inputs.platform }} ${{ github.event.inputs.version }} → Store" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Version: \`${{ env.VERSION_NUMBER }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Platform: \`${{ github.event.inputs.platform }}\`" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ github.event.inputs.platform }}" != "android" ]; then
            echo "- TestFlight: https://appstoreconnect.apple.com/apps/6477443899/testflight" >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ "${{ github.event.inputs.platform }}" != "ios" ]; then
            echo "- Google Play: https://play.google.com/console" >> "$GITHUB_STEP_SUMMARY"
          fi
