apiVersion: apps/v1
kind: Deployment
metadata:
  name: p2p-backend
  namespace: p2p-exchange
  labels:
    app: p2p-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: p2p-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: p2p-backend
    spec:
      containers:
        - name: p2p-backend
          # image 由 CI/CD 在 deploy job 中動態替換
          image: ghcr.io/OWNER/p2p-exchange-service/backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8888
          env:
            # config.yaml 的敏感欄位改由環境變數注入（go-zero 支援 env 覆寫）
            - name: DATABASE_DSN
              valueFrom:
                secretKeyRef:
                  name: p2p-backend-secret
                  key: database-dsn
            - name: APP_ACCESS_SECRET
              valueFrom:
                secretKeyRef:
                  name: p2p-backend-secret
                  key: app-access-secret
            - name: BACKEND_ACCESS_SECRET
              valueFrom:
                secretKeyRef:
                  name: p2p-backend-secret
                  key: backend-access-secret
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /from/me
              port: 8888
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /from/me
              port: 8888
            initialDelaySeconds: 5
            periodSeconds: 10
      imagePullSecrets:
        - name: ghcr-pull-secret
