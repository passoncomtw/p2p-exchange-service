apiVersion: v1
kind: Namespace
metadata:
  name: local-infra
---
apiVersion: v1
kind: Secret
metadata:
  name: redis-secret
  namespace: local-infra
type: Opaque
stringData:
  password: "redis@local123"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-config
  namespace: local-infra
data:
  redis.conf: |
    requirepass redis@local123
    appendonly yes
    maxmemory 256mb
    maxmemory-policy allkeys-lru
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: local-infra
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          command: ["redis-server", "/etc/redis/redis.conf"]
          volumeMounts:
            - name: config
              mountPath: /etc/redis
      volumes:
        - name: config
          configMap:
            name: redis-config
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: local-infra
spec:
  type: NodePort
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
      nodePort: 30379
