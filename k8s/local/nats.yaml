apiVersion: v1
kind: Secret
metadata:
  name: nats-secret
  namespace: local-infra
type: Opaque
stringData:
  nats.conf: |
    port: 4222
    http_port: 8222

    authorization {
      user: nats
      password: "nats@local123"
    }

    jetstream {
      store_dir: /data/jetstream
      max_memory_store: 256MB
      max_file_store: 1GB
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nats
  namespace: local-infra
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nats
  template:
    metadata:
      labels:
        app: nats
    spec:
      containers:
        - name: nats
          image: nats:2.10-alpine
          ports:
            - containerPort: 4222
              name: client
            - containerPort: 8222
              name: monitor
          args: ["-c", "/etc/nats/nats.conf"]
          volumeMounts:
            - name: config
              mountPath: /etc/nats
            - name: data
              mountPath: /data
      volumes:
        - name: config
          secret:
            secretName: nats-secret
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: nats
  namespace: local-infra
spec:
  type: NodePort
  selector:
    app: nats
  ports:
    - name: client
      port: 4222
      targetPort: 4222
      nodePort: 30422
    - name: monitor
      port: 8222
      targetPort: 8222
      nodePort: 30822
